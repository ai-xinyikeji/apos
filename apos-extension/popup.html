<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APOS Extension</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 360px;
      min-height: 400px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #e2e8f0;
      padding: 0;
    }

    .header {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      padding: 20px;
      text-align: center;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .header p {
      font-size: 12px;
      opacity: 0.9;
    }

    .content {
      padding: 20px;
    }

    .status-card {
      background: rgba(30, 41, 59, 0.5);
      border: 1px solid rgba(71, 85, 105, 0.3);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .status-row:last-child {
      margin-bottom: 0;
    }

    .status-label {
      font-size: 13px;
      color: #94a3b8;
    }

    .status-value {
      font-size: 13px;
      font-weight: 500;
    }

    .status-connected {
      color: #10b981;
    }

    .status-disconnected {
      color: #ef4444;
    }

    .status-warning {
      color: #f59e0b;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: rgba(71, 85, 105, 0.3);
      color: #e2e8f0;
      border: 1px solid rgba(71, 85, 105, 0.5);
    }

    .btn-secondary:hover {
      background: rgba(71, 85, 105, 0.5);
    }

    .message {
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 12px;
      display: none;
    }

    .message.show {
      display: block;
    }

    .message-success {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.3);
      color: #10b981;
    }

    .message-error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #ef4444;
    }

    .message-info {
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid rgba(59, 130, 246, 0.3);
      color: #3b82f6;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .footer {
      padding: 16px 20px;
      border-top: 1px solid rgba(71, 85, 105, 0.3);
      text-align: center;
      font-size: 11px;
      color: #64748b;
    }

    .footer a {
      color: #818cf8;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    .cookie-count {
      display: flex;
      justify-content: space-between;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(71, 85, 105, 0.3);
    }

    .cookie-item {
      text-align: center;
    }

    .cookie-item-label {
      font-size: 11px;
      color: #64748b;
      margin-bottom: 4px;
    }

    .cookie-item-value {
      font-size: 16px;
      font-weight: 600;
      color: #818cf8;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🤖 APOS Extension</h1>
    <p>AI Product OS 浏览器伴侣</p>
  </div>

  <div class="content">
    <div id="message" class="message"></div>

    <div class="status-card">
      <div class="status-row">
        <span class="status-label">本地服务器</span>
        <span id="serverStatus" class="status-value status-disconnected">未连接</span>
      </div>
      <div class="status-row">
        <span class="status-label">ChatGPT Cookies</span>
        <span id="chatgptStatus" class="status-value status-warning">未检测</span>
      </div>
      <div class="status-row">
        <span class="status-label">Gemini Cookies</span>
        <span id="geminiStatus" class="status-value status-warning">未检测</span>
      </div>
      <div class="status-row">
        <span class="status-label">Kimi Cookies</span>
        <span id="kimiStatus" class="status-value status-warning">未检测</span>
      </div>

      <div class="cookie-count">
        <div class="cookie-item">
          <div class="cookie-item-label">ChatGPT</div>
          <div id="chatgptCount" class="cookie-item-value">0</div>
        </div>
        <div class="cookie-item">
          <div class="cookie-item-label">Gemini</div>
          <div id="geminiCount" class="cookie-item-value">0</div>
        </div>
        <div class="cookie-item">
          <div class="cookie-item-label">Kimi</div>
          <div id="kimiCount" class="cookie-item-value">0</div>
        </div>
      </div>
    </div>

    <button id="syncBtn" class="btn btn-primary">
      同步 Cookies 到 APOS
    </button>

    <button id="refreshBtn" class="btn btn-secondary">
      刷新状态
    </button>

    <button id="openSettingsBtn" class="btn btn-secondary">
      打开 APOS 设置
    </button>
  </div>

  <div class="footer">
    <p>Version 1.0.0 | <a href="https://github.com/your-repo/apos" target="_blank">GitHub</a></p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
